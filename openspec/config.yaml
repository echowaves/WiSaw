schema: spec-driven

context: |
  Tech stack: React Native 0.81.5, Expo 54.0.25, Expo Router 6.0.15, React 19.1.0
  State management: Jotai 2.15.0 (atomic state)
  API: Apollo Client 4.0.2, GraphQL 16.8.1 with WebSocket subscriptions
  Storage: expo-secure-store for sensitive data
  Platforms: iOS, Android, Web
  Domain: Location-based anonymous social photo sharing app (WiSaw)
  Architecture: File-based routing (Expo Router), modular screens with reducers and custom hooks
  Language: JavaScript with gradual TypeScript adoption in router files
  Key conventions: Kebab-case file names, screen-level state with Jotai atoms, anonymous user identity via device UUID
  Dependencies: Always use exact versions in package.json (no ^ or ~ prefixes)
  Package manager: npm


rules:
  tasks:
    - When adding or updating dependencies, always use exact versions (e.g., "1.2.3" not "^1.2.3" or "~1.2.3"). Use --save-exact with npm install.
  security:
    - The .env file must never be committed to version control. It must remain in .gitignore at all times.
    - Secrets and sensitive values from .env (API keys, tokens, credentials, connection strings) must never be hardcoded or leaked into any versioned file. Always reference them via environment variables at runtime.
